# AP E2E testing override
# Provides nginx HTTPS reverse proxy for ActivityPub E2E tests with Iceshrimp.
#
# Usage:
#   # Generate certificates first:
#   bash e2e/certs/gen-cert.sh
#
#   # Start with Emumet and mock peer running on the host:
#   docker compose --profile ap-e2e -f compose.yml -f compose.ap-e2e.yml up -d

volumes:
  iceshrimp_db_data:

services:
  nginx:
    image: nginx:1-alpine
    container_name: emumet-ap-e2e-nginx
    profiles:
      - ap-e2e
    ports:
      - "8443:8443"
    volumes:
      - type: bind
        source: ./e2e/certs/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
        bind:
          selinux: z
      - type: bind
        source: ./e2e/certs
        target: /etc/nginx/certs
        read_only: true
        bind:
          selinux: z
    extra_hosts:
      # Use DOCKER_HOST_IP for rootless Docker compatibility
      # (rootless Docker's host-gateway resolves to an unreachable bridge IP).
      # The runner script (e2e/run-ap-e2e.sh) auto-detects and sets this.
      - "host.docker.internal:${DOCKER_HOST_IP:-host-gateway}"
    networks:
      default:
        aliases:
          - emumet.127.0.0.1.nip.io
          - peer.127.0.0.1.nip.io
          - iceshrimp.127.0.0.1.nip.io
    depends_on:
      iceshrimp:
        condition: service_started

  iceshrimp-db:
    image: docker.io/postgres:16-alpine
    container_name: emumet-ap-e2e-iceshrimp-db
    profiles:
      - ap-e2e
    environment:
      POSTGRES_DB: iceshrimp
      POSTGRES_USER: iceshrimp
      POSTGRES_PASSWORD: iceshrimp-pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceshrimp"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - iceshrimp_db_data:/var/lib/postgresql/data

  iceshrimp:
    image: iceshrimp.dev/iceshrimp/iceshrimp:v2026.5.1
    container_name: emumet-ap-e2e-iceshrimp
    profiles:
      - ap-e2e
    depends_on:
      iceshrimp-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - type: bind
        source: ./e2e/iceshrimp/.config
        target: /iceshrimp/.config
        read_only: true
    expose:
      - "3000"
