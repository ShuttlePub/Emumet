name: E2E Tests

on:
  push:
    branches: [main, fix/signin]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Create master-key-password file
        run: |
          echo -n "ci-test-master-key-password" > master-key-password
          chmod 600 master-key-password

      - name: Start services via docker compose
        run: docker compose up -d

      - name: Wait for postgres
        run: |
          n=0
          until docker compose exec -T postgres pg_isready -U postgres > /dev/null 2>&1; do
            n=$((n+1))
            if [ $n -ge 30 ]; then echo "ERROR: postgres not ready"; exit 1; fi
            echo "Waiting for postgres... ($n)"
            sleep 2
          done

      - name: Wait for redis
        run: |
          n=0
          until docker compose exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; do
            n=$((n+1))
            if [ $n -ge 30 ]; then echo "ERROR: redis not ready"; exit 1; fi
            echo "Waiting for redis... ($n)"
            sleep 2
          done

      - name: Wait for Ory services (Kratos, Hydra, Keto)
        run: |
          for port in 4433 4444 4445 4466 4467; do
            n=0
            until curl -sf http://localhost:$port/health/alive > /dev/null 2>&1; do
              n=$((n+1))
              if [ $n -ge 30 ]; then echo "ERROR: port $port not ready"; exit 1; fi
              echo "Waiting for port $port... ($n)"
              sleep 2
            done
            echo "Port $port is ready"
          done

      - name: Create .env file
        run: |
          {
            echo "DATABASE_URL=postgres://postgres:develop@localhost:5432/postgres"
            echo "HYDRA_ISSUER_URL=http://localhost:4444/"
            echo "HYDRA_ADMIN_URL=http://localhost:4445/"
            echo "KRATOS_PUBLIC_URL=http://localhost:4433/"
            echo "EXPECTED_AUDIENCE=account"
            echo "KETO_READ_URL=http://localhost:4466"
            echo "KETO_WRITE_URL=http://localhost:4467"
            echo "REDIS_URL=redis://localhost:6379"
            echo "WORKER_ID=0"
            echo "CORS_ALLOWED_ORIGINS=*"
          } > .env

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install sqlx-cli
        run: cargo binstall sqlx-cli --no-confirm

      - name: Run database migrations
        run: sqlx migrate run
        env:
          DATABASE_URL: postgres://postgres:develop@localhost:5432/postgres

      - name: Run E2E tests
        run: cargo test -p server --test e2e_basic_flow -- --ignored --test-threads=1 --nocapture

      - name: Collect docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v
