events {}

http {
  # Debug log format for troubleshooting ActivityPub delivery issues
  log_format debug_detail '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           'sni=$ssl_server_name '
                           'server_name=$server_name '
                           'host=$host '
                           'http_host=$http_host '
                           'upstream=$upstream_addr '
                           'upstream_status=$upstream_status';

  # Upstreams: services running on host or in Docker compose
  # DOCKER_HOST_IP is set by compose.ap-e2e.yml extra_hosts so that
  # host.docker.internal resolves to a reachable IP for rootless Docker.
  upstream emumet {
    server host.docker.internal:8080;
  }
  upstream iceshrimp {
    server iceshrimp:3000;
  }
  # mastodon upstream uses runtime variable + Docker DNS resolver (127.0.0.11)
  # so nginx starts even when mastodon-web is not yet resolvable. Without this,
  # nginx would [emerg] fail on "host not found in upstream".
  # Shared SSL config
  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;

  # HTTPS server for emumet.127.0.0.1.nip.io
  # Port 443 is needed for Docker-internal connections (Iceshrimp resolves
  # emumet.127.0.0.1.nip.io to nginx's container IP and uses the default HTTPS port).
  server {
    listen 8443 ssl;
    listen 443 ssl;
    server_name emumet.127.0.0.1.nip.io;

    location / {
      proxy_pass http://emumet;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_verify off;
    }
  }

  # HTTPS server for iceshrimp.127.0.0.1.nip.io
  server {
    listen 8443 ssl;
    server_name iceshrimp.127.0.0.1.nip.io;

    location / {
      proxy_pass http://iceshrimp;

      proxy_set_header Host              "iceshrimp.127.0.0.1.nip.io:8443";
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_verify off;
    }
  }

  # HTTPS server for mastodon.127.0.0.1.nip.io
  server {
    listen 8443 ssl;
    listen 18443 ssl;
    listen 443 ssl;
    server_name mastodon.127.0.0.1.nip.io;

    # Docker DNS resolver for runtime variable-based proxy_pass
    # This avoids nginx [emerg] failure when mastodon-web is not yet resolvable.
    resolver 127.0.0.11 valid=5s ipv6=off;

    location / {
      set $mastodon_backend "mastodon-web:3000";
      proxy_pass http://$mastodon_backend;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_verify off;
    }

    # Increase body size for ActivityPub delivery
    client_max_body_size 10m;
  }

  access_log /var/log/nginx/debug_access.log debug_detail;
}
