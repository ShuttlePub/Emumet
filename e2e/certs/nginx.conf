events {}

http {
  # Upstream: Emumet server running on host
  upstream emumet {
    server host.docker.internal:8080;
  }

  # Upstream: mock AP peer running on host
  upstream peer {
    server host.docker.internal:18081;
  }

  # Upstream: Iceshrimp running in Docker compose
  upstream iceshrimp {
    server iceshrimp:3000;
  }

  # Upstream: Mastodon running in Docker compose
  upstream mastodon {
    server mastodon-web:3000;
  }

  # Upstream: Mastodon streaming API in Docker compose
  upstream mastodon-streaming {
    server mastodon-streaming:4000;
  }

  # HTTPS server for emumet.127.0.0.1.nip.io
  server {
    listen 8443 ssl;
    server_name emumet.127.0.0.1.nip.io;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
      proxy_pass http://emumet;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Emumet is HTTP, so disable upstream SSL verification
      proxy_ssl_verify off;
    }
  }

  # HTTPS server for peer.127.0.0.1.nip.io
  server {
    listen 8443 ssl;
    server_name peer.127.0.0.1.nip.io;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
      proxy_pass http://peer;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Peer is HTTP, so disable upstream SSL verification
      proxy_ssl_verify off;
    }
  }

  # HTTPS server for iceshrimp.127.0.0.1.nip.io
  server {
    listen 8443 ssl;
    server_name iceshrimp.127.0.0.1.nip.io;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
      proxy_pass http://iceshrimp;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Iceshrimp is HTTP, so disable upstream SSL verification
      proxy_ssl_verify off;
    }
  }

  # HTTPS server for mastodon.127.0.0.1.nip.io
  server {
    listen 8443 ssl;
    server_name mastodon.127.0.0.1.nip.io;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    location / {
      proxy_pass http://mastodon;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Mastodon is HTTP, so disable upstream SSL verification
      proxy_ssl_verify off;
    }

    # Mastodon streaming API (WebSocket-based)
    location ~ ^/api/v1/streaming/ {
      proxy_pass http://mastodon-streaming;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket support
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_ssl_verify off;
    }
  }
}
